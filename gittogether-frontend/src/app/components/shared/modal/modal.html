<div class="modal-overlay" *ngIf="config" (mousedown)="onMouseDown($event)" (mouseup)="onMouseUp($event)">
  <div class="modal-container">
    <!-- Header -->
    <div class="modal-header">
      <h2>{{ config.title }}</h2>
      <p *ngIf="config.message">{{ config.message }}</p>
    </div>

    <!-- Dynamic Form Inputs -->
    <div class="modal-form" *ngIf="config.type === 'form' && config.inputs">
      <div class="input-group" *ngFor="let input of config.inputs">
        <label [for]="input.name">{{ input.label }}</label>
        
        <input *ngIf="input.type === 'text'" 
               [type]="input.type" 
               [id]="input.name" 
               [(ngModel)]="input.value" 
               [placeholder]="input.placeholder || ''"
               (keyup.enter)="onConfirm()">

        <textarea *ngIf="input.type === 'textarea'" 
                  [id]="input.name" 
                  [(ngModel)]="input.value" 
                  [placeholder]="input.placeholder || ''"></textarea>

        <!-- Tag Editor -->
        <div *ngIf="input.type === 'tags'" class="tag-editor">
          <div class="selected-tags">
            <span *ngFor="let tag of input.value" class="modal-tag">
              #{{ tag }}
              <button class="remove-tag" (click)="removeTag(input, tag)">&times;</button>
            </span>
          </div>
          <div class="tag-input-wrapper">
            <input type="text" 
                   [(ngModel)]="tagQuery" 
                   (input)="onTagInput($event)"
                   [placeholder]="input.placeholder || 'Escribe para buscar tags...'"
                   (keydown.enter)="addCustomTag(input)">
            
            <div class="tag-suggestions" *ngIf="suggestions.length > 0">
              <div *ngFor="let suggestion of suggestions" 
                   class="suggestion-item"
                   (click)="addTag(input, suggestion.nombre)">
                #{{ suggestion.nombre }}
              </div>
            </div>
          </div>
        </div>

        <div *ngIf="input.type === 'files'" class="files-editor">
            <label [for]="input.name" class="custom-file-upload">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="upload-icon"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                <span>{{ (input.value && input.value.length > 0) ? input.value.length + ' archivos seleccionados' : 'Haz clic para adjuntar archivos' }}</span>
            </label>
            <input type="file" multiple (change)="onFilesSelected(input, $event)" [id]="input.name" class="hidden-file-input">
            <div class="selected-files-preview" *ngIf="input.value && input.value.length > 0">
                <div class="selected-file-chip" *ngFor="let file of input.value; let i = index">
                    <span class="chip-name">{{ file.name || file.nombreOriginal }}</span>
                    <button class="chip-remove" (click)="removeFile(input, i)">&times;</button>
                </div>
            </div>
        </div>
      </div>
    </div>

    <!-- Footer Actions -->
    <div class="modal-footer">
      <button class="btn btn-cancel" (click)="onCancel()">
        {{ config.cancelText || 'Cancelar' }}
      </button>
      <button class="btn" 
              [class.btn-confirm]="config.type !== 'danger'"
              [class.btn-danger]="config.type === 'danger'"
              (click)="onConfirm()">
        {{ config.confirmText || 'Confirmar' }}
      </button>
    </div>
  </div>
</div>
