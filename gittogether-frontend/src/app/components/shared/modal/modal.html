<div class="modal-overlay" *ngIf="config" (mousedown)="onMouseDown($event)" (mouseup)="onMouseUp($event)">
  <div class="modal-container" [class.modal-large]="config.isLarge">
    <!-- Header -->
    <div class="modal-header">
      <h2>{{ config.title }}</h2>
      <p *ngIf="config.message">{{ config.message }}</p>
    </div>

    <!-- Dynamic Form Inputs -->
    <div class="modal-form" *ngIf="config.type === 'form' && config.inputs">
      <div class="input-group" *ngFor="let input of config.inputs">
        <label [for]="input.name">{{ input.label }}</label>
        
        <input *ngIf="input.type === 'text'" 
               [type]="input.type" 
               [id]="input.name" 
               [(ngModel)]="input.value" 
               [placeholder]="input.placeholder || ''"
               (keyup.enter)="onConfirm()">

        <textarea *ngIf="input.type === 'textarea'" 
                  [id]="input.name" 
                  [(ngModel)]="input.value" 
                  [placeholder]="input.placeholder || ''"></textarea>

        <!-- Markdown Editor -->
        <div *ngIf="input.type === 'markdown'" class="markdown-editor-container">
          <div class="markdown-toolbar">
              <button type="button" (click)="insertarMarkdown(input, 'bold')" title="Negrita"><b>B</b></button>
              <button type="button" (click)="insertarMarkdown(input, 'italic')" title="Cursiva"><i>I</i></button>
              <button type="button" (click)="insertarMarkdown(input, 'h1')" title="Encabezado">H1</button>
              <button type="button" (click)="insertarMarkdown(input, 'list')" title="Lista">List</button>
              <button type="button" (click)="insertarMarkdown(input, 'code')" title="Código"><code>&lt;/&gt;</code></button>
              <button type="button" (click)="insertarMarkdown(input, 'code', true)" title="Bloque de código">Code Block</button>
              <button type="button" (click)="insertarMarkdown(input, 'link')" title="Enlace">Link</button>
          </div>
          <textarea [id]="input.name" 
                    [(ngModel)]="input.value" 
                    [placeholder]="input.placeholder || ''"
                    class="markdown-textarea"
                    rows="8"></textarea>
        </div>

        <!-- Tag Editor -->
        <div *ngIf="input.type === 'tags'" class="tag-editor">
          <div class="selected-tags">
            <span *ngFor="let tag of input.value" class="modal-tag">
              #{{ tag }}
              <button class="remove-tag" (click)="removeTag(input, tag)">&times;</button>
            </span>
          </div>
          <div class="tag-input-wrapper">
            <input type="text" 
                   [(ngModel)]="tagQuery" 
                   (input)="onTagInput($event)"
                   [placeholder]="input.placeholder || 'Escribe para buscar tags...'"
                   (keydown.enter)="addCustomTag(input)">
            
            <div class="tag-suggestions" *ngIf="suggestions.length > 0">
              <div *ngFor="let suggestion of suggestions" 
                   class="suggestion-item"
                   (click)="addTag(input, suggestion.nombre)">
                #{{ suggestion.nombre }}
              </div>
            </div>
          </div>
        </div>

        <div *ngIf="input.type === 'files'" class="files-editor">
            <input type="file" multiple (change)="onFilesSelected(input, $event)" [id]="input.name">
            <div class="selected-files-preview" *ngIf="input.value && input.value.length > 0" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;">
                <div class="selected-file-chip" *ngFor="let file of input.value; let i = index" style="display: flex; align-items: center; gap: 6px; padding: 4px 10px; background: rgba(var(--accent-color-rgb), 0.1); border: 1px solid rgba(var(--accent-color-rgb), 0.3); border-radius: 16px; font-size: 0.85rem;">
                    <span class="chip-name" style="max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ file.name || file.nombreOriginal }}</span>
                    <button class="chip-remove" (click)="removeFile(input, i)" style="background: none; border: none; color: white; cursor: pointer;">&times;</button>
                </div>
            </div>
        </div>
      </div>
    </div>

    <!-- Footer Actions -->
    <div class="modal-footer">
      <button class="btn btn-cancel" (click)="onCancel()">
        {{ config.cancelText || 'Cancelar' }}
      </button>
      <button class="btn" 
              [class.btn-confirm]="config.type !== 'danger'"
              [class.btn-danger]="config.type === 'danger'"
              (click)="onConfirm()">
        {{ config.confirmText || 'Confirmar' }}
      </button>
    </div>
  </div>
</div>
