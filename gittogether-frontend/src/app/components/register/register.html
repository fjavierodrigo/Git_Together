<div class="login-wrapper">
    <!-- Efectos de luz de fondo para dar sensación de profundidad -->
    <div class="ambient-glow bg-blur-1"></div>
    <div class="ambient-glow bg-blur-2"></div>

    <!-- Iconos de marca flotantes en los laterales -->
    <div class="bg-brand-icon icon-1">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1"
                stroke-linecap="round" stroke-linejoin="round" />
        </svg>
    </div>
    <div class="bg-brand-icon icon-2">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1"
                stroke-linecap="round" stroke-linejoin="round" />
        </svg>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-wrapper">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </div>

            <h1 class="title">Únete a GitTogether</h1>
            <p class="subtitle">Crea tu cuenta de desarrollador</p>

            <form (submit)="onRegister($event)" class="login-form">
                <div class="avatar-upload-section">
                    <div class="avatar-preview-container" (click)="fileInput.click()">
                        <img [src]="avatarPreview || 'https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff&size=128'" 
                             alt="Vista previa avatar" class="avatar-preview-img">
                        <div class="avatar-upload-overlay">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                                <circle cx="12" cy="13" r="4"></circle>
                            </svg>
                        </div>
                    </div>
                    <p class="avatar-upload-text">Añade tu foto de perfil (opcional)</p>
                    <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none;">
                </div>

                <div class="input-group">
                    <label>Alias</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" name="nombre" [(ngModel)]="registerData.nombre" required
                            placeholder="Tu nombre de usuario">
                    </div>
                </div>

                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input type="email" name="email" [(ngModel)]="registerData.email" required
                            placeholder="tu@email.com">
                    </div>
                </div>

                <div class="input-group">
                    <label>Contraseña</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" name="password" [(ngModel)]="registerData.password" required
                            placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" class="btn-login" [disabled]="!registerData.nombre || !registerData.email || !registerData.password">
                    <span>Crear cuenta</span>
                </button>

                <button type="button" class="btn-register" (click)="goToLogin()">
                    <span>Volver al login</span>
                </button>

                <!-- Dynamic error message -->
                <div class="error-msg" *ngIf="errorMessage">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <span>{{ errorMessage }}</span>
                </div>
            </form>
        </div>
    </div>
</div>
