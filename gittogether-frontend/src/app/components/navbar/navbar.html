<nav class="navbar-container">
    <div class="header-logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span class="logo-text">GitTogether</span>
    </div>

    <div class="header-actions">
        <!-- Theme Toggle Switch -->
        <label class="theme-switch" title="Cambiar tema">
            <input type="checkbox" 
                   [checked]="(isDarkTheme$ | async) === false"
                   (change)="toggleTheme()">
            <span class="slider">
                <span class="icon sun">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </span>
                <span class="icon moon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </span>
            </span>
        </label>

        <div class="header-user" *ngIf="usuarioLogueado">
            <div class="user-info-section" (click)="goToProfile()" style="cursor: pointer;" title="Ver Perfil">
                <div class="avatar-container">
                    <img *ngIf="usuarioLogueado?.avatar && !imageError" 
                         [src]="getAvatarUrl()" 
                         (error)="handleImageError()"
                         alt="Avatar" class="user-avatar">
                    <div *ngIf="!usuarioLogueado?.avatar || imageError" class="initials-avatar">
                        {{ getInitials() }}
                    </div>
                    <div class="online-dot"></div>
                </div>
                <span class="user-name">{{ usuarioLogueado.nombre }}</span>
            </div>

            <div class="header-divider"></div>

            <button class="btn-header-logout" (click)="onLogout()" title="Cerrar Sesión">
                <svg class="logout-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </button>
        </div>
    </div>
</nav>
