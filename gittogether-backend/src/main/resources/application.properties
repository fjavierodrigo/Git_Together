# URL de conexión (Asegúrate de poner tu endpoint de AWS y el nombre de tu BD)
spring.datasource.url=jdbc:mysql://52.0.164.75:3306/git_together_bbdd

# Credenciales de AWS
spring.datasource.username=gittogether
spring.datasource.password=gittogether123

# Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Estrategia de Hibernate (update crea las tablas automáticamente si no existen)
spring.jpa.hibernate.ddl-auto=update

# Mostrar las consultas SQL en la consola (muy útil para el TFG)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Puerto del servidor
server.port=8080

# Motor InnoDB
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect